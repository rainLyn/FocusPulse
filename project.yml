name: FocusPulse
options:
  bundleIdPrefix: com.focuspulse
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  usesTabs: false

settings:
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "1.0"
  CURRENT_PROJECT_VERSION: "1"

schemes:
  FocusPulse:
    build:
      targets:
        FocusPulse: all
        FocusPulseCore: all
        FocusPulseWidget: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FocusPulseTests

targets:
  FocusPulse:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Core"
          - "Widget"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.focuspulse.app
      INFOPLIST_FILE: Support/Info.plist
      DEVELOPMENT_TEAM: ${TEAM_ID}
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_KEY_NSSupportsLiveActivities: YES
    dependencies:
      - target: FocusPulseCore
      - target: FocusPulseWidget
        embed: true

  FocusPulseCore:
    type: framework
    platform: iOS
    sources:
      - path: Sources/Core
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.focuspulse.core
      GENERATE_INFOPLIST_FILE: YES
      SKIP_INSTALL: YES

  FocusPulseWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/Widget
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.focuspulse.app.timer-widget
      INFOPLIST_FILE: Sources/Widget/Info.plist
      DEVELOPMENT_TEAM: ${TEAM_ID}
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - target: FocusPulseCore

  FocusPulseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: FocusPulseCore
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.focuspulse.tests
      GENERATE_INFOPLIST_FILE: YES
